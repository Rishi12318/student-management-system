# Production Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://production-db:3306/student_management_db}
spring.datasource.username=${DB_USERNAME:studentms_user}
spring.datasource.password=${DB_PASSWORD:secure_password}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Production Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Production
app.jwt.secret=${JWT_SECRET:production_secret_key_must_be_changed}
app.jwt.expiration.ms=86400000

# Logging Production
logging.level.com.studentms=WARN
logging.level.org.springframework=WARN
logging.file.name=logs/studentms.log
logging.file.max-size=10MB
logging.file.max-history=30

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
